version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sqr_vendas_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sqr_vendas_worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sqr_vendas_beat
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sqr_vendas_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: sqr_vendas_frontend
    environment:
      - VITE_API_URL=http://api:8000
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
